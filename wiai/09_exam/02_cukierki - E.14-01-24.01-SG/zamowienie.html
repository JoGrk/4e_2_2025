<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabryka cukierków</title>
    <link rel="stylesheet" href="styl10.css">
</head>
<body>
 
    <section class="top">
        <section>
            <a href="zamowienie.html">Zamów cukierki</a>
        </section>

        <section>
            <a href="index.html"><img src="logotyp.png" alt="Nasze logo"> </a>
        </section>
    </section>

    <header>
        <h1>Strefa zamówień</h1>
    </header>

    <main>
        <section class="left">
            <label for="shape">Numer kształtu:</label>
            <input type="number" name="shape" id="shape">
            <label for="">skomponuj swój kolor, podaj RGB:</label>
            <label for="red">R:</label>
            <input type="number" name="red" id="red">
            <label for="green">G:</label>
            <input type="number" name="green" id="green">
            <label for="blue">B:</label>
            <input type="number" name="blue" id="blue">
            <button id="order">Zamówienie</button>
            <p id="result">Twoje zamówienie</p>
            <button id="color">Kolor</button>

        </section>

        <section class="right">
            <h2>Nasza oferta</h2>
            <table>
                <tr>
                    <td>Kształty</td>
                    <td rowspan="2">Możesz zamówić <br> dowolny kolor cukierka</td>
                </tr>
                <tr>
                    <td>
                        <ol>
                            <li>cytryna</li>
                            <li>liść</li>
                            <li>banan</li>
                        </ol>
                    </td>
                </tr>
            </table>
        </section>
    </main>

    <footer>
        <p>Autor strony:00000000000</p>
    </footer>
    
</body>
</html>
