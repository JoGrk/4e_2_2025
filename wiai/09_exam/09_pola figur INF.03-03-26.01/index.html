<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pola figur</title>
    <link rel="stylesheet" href="styl.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <header>
        <h2>Pola figur płaskich</h2>
    </header>

    <main>
        <nav>
            <h3>MENU</h3>
            <ul>
                <li><a href="./index.html">Prostoką i trójkąt</a></li>
                <li><a href="./kolo.html">Okrąg i koło</a></li>
            </ul>
        </nav>

        <section>
            <img src="./1d.bmp" alt="Figura" id="mainImg">
            <br>
            <img src="./1m.bmp" alt="Wybierz trójkąt" class="selShape" id="firstSub">
            <img src="2m.bmp" alt="Wybierz prostokąt" class="selShape" id="secondSub">
        </section>

        <aside>
            <h3>Pole prostokąta / pole trójkąta</h3>

            <label for="sideA">Bok prostokąta / podstawa trójkąta:</label>
            <br>
            <input type="number" name="sideA" id="sideA">
            <br>
            <label for="sideB">Drugi bok / wysokość trójkąta</label>
            <br>
            <input type="number" name="sideB" id="sideB">
            <br>
            <button>Oblicz</button>
            <br>
            <p id="result"></p>
        </aside>

    </main>

    <footer>
        <p>Autor:0000000000</p>
    </footer>

</body>
</html>
